<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>icaanzganteng AI</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0f19; color: #e2e8f0; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #111827; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; border-bottom: 2px solid #1f2937; color: #38bdf8; position: relative; }
        .sub-title { font-size: 0.8rem; color: #9ca3af; font-weight: normal; margin-top: 2px; }
        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 18px; line-height: 1.4; font-size: 0.95rem; word-break: break-word; }
        .user-message { background-color: #0284c7; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-message { background-color: #1f2937; color: #e2e8f0; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #374151; }
        .typing { color: #9ca3af; font-style: italic; font-size: 0.85rem; padding-left: 5px; }
        .input-container { padding: 15px; background-color: #111827; display: flex; gap: 10px; border-top: 2px solid #1f2937; }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #374151; background-color: #1f2937; color: white; font-size: 0.95rem; outline: none; }
        input:focus { border-color: #38bdf8; }
        button { background-color: #0284c7; color: white; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #0369a1; }
    </style>
</head>
<body>

    <header>
        🦖 icaanzganteng AI 🦖
        <div class="sub-title">Chatbot Dino Paling Tampan & Toxic</div>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="message bot-message">Paan lu? Mau nanya apaan ama gw yang ganteng ini? Nanya yang bermutu dikit ya, ndasmu jangan ditaruh di rumah! 🦖🔥</div>
    </div>

    <div class="input-container">
        <input type="text" id="userInput" placeholder="Kirim pesan ke ganteng..." onkeydown="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Kirim</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Tampilkan pesan user
            appendMessage(text, 'user-message');
            userInput.value = '';

            // Tampilkan status ngetik
            const typingId = 'typing-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing';
            typingDiv.id = typingId;
            typingDiv.innerText = 'Si ganteng lagi mikir ketikan maut...';
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // DI SINI PERBAIKANNYA: Menggunakan path relatif /api/chat agar Vercel membaca fungsi backend kita
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                document.getElementById(typingId).remove();

                if (response.ok && data.reply) {
                    appendMessage(data.reply, 'bot-message');
                    // Bonus confetti tipis-tipis biar asik pas AI sukses bales
                    confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 } });
                } else {
                    appendMessage("Yailah error, servernya ngambek kali. Coba cek API Key lu di Vercel, cok!", 'bot-message');
                }
            } catch (error) {
                if (document.getElementById(typingId)) document.getElementById(typingId).remove();
                appendMessage("Gagal konek ke server. Lu punya kuota gak sih?", 'bot-message');
            }
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
